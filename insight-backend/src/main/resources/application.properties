server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/kidcare_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:1234567890123456789012345678901234567890}
jwt.expiration=86400000

# Frontend
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.com.kidcare.insight=DEBUG
logging.level.org.springframework.security=DEBUG
# Timeout configuration
server.connection-timeout=60000
server.servlet.session.timeout=60000

# Logging pour debug
logging.level.com.kidcare.insight.controller.BehavioralTestController=DEBUG
logging.level.org.springframework.web=DEBUG

# Spring
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.favor-path-extension=false
spring.http.converters.preferred-json-mapper=jackson
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql